<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">
		
  <style>
/* Container */
.switch {
  display: inline-block;
  position: relative;
  width: 60px;
  height: 30px;
}

/* Verberg checkbox */
.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

/* Slider (achtergrond) */
.slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background-color: #ddd;
  border-radius: 30px;
  transition: background-color 0.3s ease;
  display: flex;
  align-items: center;
  padding: 3px;
  box-sizing: border-box;
}

/* Bolletje */
.button {
  height: 24px;
  width: 24px;
  background-color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #000;
  transition: transform 0.3s ease;
  user-select: none;
}

/* AAN state */
.switch input:checked + .slider {
  background-color: #4caf50;
}

.switch input:checked + .slider .button {
  transform: translateX(30px);
}
  </style>
</head>

<body>
  <h1>Switch control</h1>

 <label class="switch">
  <input type="checkbox">
  <span class="slider">
    <span class="button">aan</span>
  </span>
</label>

		<details open>
			<summary>Demo video</summary>
			<video src="assets/switch.mp4" width="119" height="67" controls muted autoplay loop>
				<a href="assets/switch.mp4">assets/switch.mp4</a>
			</video>
		</details>
	</body>
</html>
