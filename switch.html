<!doctype html>
<html lang="nl">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width">
		<title>Switch control / Progressive Enhancement / FDND</title>
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
		<link href="assets/styles.css" rel="stylesheet">
		
  <style>
    /* Basis */
    body {
      font-family: sans-serif;
      padding: 2rem;
    }

    /* DETAILS RESET */
    .switch summary {
      list-style: none;
      cursor: pointer;
    }

    .switch summary::-webkit-details-marker {
      display: none;
    }

    /* SWITCH TRACK */
    .slider {
      display: flex;
      align-items: center;
      width: 90px;
      height: 40px;
      background: #ccc;
      border-radius: 999px;
      padding: 5px;
      transition: 0.3s;
    }

    /* BUTTON (bolletje) */
    .button {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: 0.3s;
    }

    /* AAN (details open) */
    .switch[open] .slider {
      background: linear-gradient(to right, #5fd3a1, #4caf50);
    }

    .switch[open] .button {
      transform: translateX(45px);
    }
  </style>
</head>

<body>
  <h1>Switch control</h1>

  <details class="switch">
    <summary>
      <span class="slider">
        <span class="button">aan</span>
      </span>
    </summary>
  </details>

		<details open>
			<summary>Demo video</summary>
			<video src="assets/switch.mp4" width="119" height="67" controls muted autoplay loop>
				<a href="assets/switch.mp4">assets/switch.mp4</a>
			</video>
		</details>
	</body>
</html>
