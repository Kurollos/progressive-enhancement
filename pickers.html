<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Favorieten picker</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #eee;
  }

  h1 {
    text-align: center;
  }

  .background-box {
    width: 60vw;
    height: 30vh;
    background: var(--bg, #A675F5);
    display: grid;
    place-items: center;
    border-radius: 20px;
    position: relative;
    transition: background 0.3s ease;
  }

  form {
    background: white;
    padding: 2rem;
    border-radius: 16px;
    display: grid;
    gap: 1rem;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 2;
  }

  input {
    padding: 0.5rem;
    border-radius: 8px;
    border: 2px solid #050542;
    font-size: 1rem;
  }

  /* kleur opties */
  .colors {
    position: absolute;
    bottom: 20px;
    display: flex;
    gap: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
  }

  .colors.show {
    opacity: 1;
    pointer-events: auto;
  }

  .color-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 3px solid white;
    cursor: pointer;
  }

  .c1 { background: #A675F5; }
  .c2 { background: #050542; }
  .c3 { background: #66E5BF; }
  .c4 { background: #FFFC86; }

</style>
</head>

<body>

<h1>Favorieten picker</h1>

<div class="background-box" id="bgBox">

  <form>
    <label>
      
      <input list="docenten" id="docentInput" placeholder="">
    </label>

    <!-- datalist = werkt zonder JS -->
    <datalist id="docenten">
      <option value="Charley Muhren">
      <option value="Cyd Stumpel">
      <option value="Dion Pieters">
      <option value="Dorien Drees">
      <option value="Joost Faber">
      <option value="Justus Sturkenboom">
      <option value="Koop Reynders">
      <option value="Krijn Hoetmer">
      <option value="Sanne 't Hooft">
      <option value="Suus ten Voorde">
    </datalist>
  </form>

  <!-- kleur opties -->
  <div class="colors" id="colorOptions">
    <div class="color-btn c1" data-color="#A675F5"></div>
    <div class="color-btn c2" data-color="#050542"></div>
    <div class="color-btn c3" data-color="#66E5BF"></div>
    <div class="color-btn c4" data-color="#FFFC86"></div>
  </div>

</div>

<script>
  const bgBox = document.getElementById("bgBox");
  const options = document.getElementById("colorOptions");

  // klik achtergrond → toon kleuren
  bgBox.addEventListener("click", (e) => {
    if (!e.target.closest("form")) {
      options.classList.toggle("show");
    }
  });

  // kleur kiezen
  document.querySelectorAll(".color-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      bgBox.style.setProperty("--bg", btn.dataset.color);
      e.stopPropagation();
    });
  });
</script>

</body>
</html>
