<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Star Rating</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    /* Verwijder standaard veldset styling */
    fieldset {
      border: none;
      padding: 0;
      margin: 0;
    }

    /* Toegankelijk verbergen van legend */
    legend {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Layout sterren */
    .rating {
      display: flex;
      flex-direction: row-reverse;
      gap: 5px;
    }

    /* Verberg radio buttons */
    .rating input {
      display: none;
    }

    /* Sterren (standaard grijs) */
    .rating label {
      width: 40px;
      height: 40px;
      cursor: pointer;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path fill="%23ccc" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798z"/></svg>') no-repeat center/contain;
    }

    /* Hover effect */
    .rating label:hover,
    .rating label:hover ~ label {
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path fill="%2366E5BF" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798z"/></svg>') no-repeat center/contain;
    }

    /* Geselecteerde rating blijft zichtbaar */
    .rating input:checked ~ label {
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><path fill="%2366E5BF" d="M32 12.408l-11.056-1.607-4.944-10.018-4.944 10.018-11.056 1.607 8 7.798-1.889 11.011 9.889-5.199 9.889 5.199-1.889-11.011 8-7.798z"/></svg>') no-repeat center/contain;
    }
  </style>
</head>

<body>

  <h1>Rating</h1>

  <form method="post">
    <fieldset class="rating">
      <legend>Geef je rating</legend>

      <input type="radio" id="star5" name="rating" value="5">
      <label for="star5" title="5 sterren"></label>

      <input type="radio" id="star4" name="rating" value="4">
      <label for="star4" title="4 sterren"></label>

      <input type="radio" id="star3" name="rating" value="3">
      <label for="star3" title="3 sterren"></label>

      <input type="radio" id="star2" name="rating" value="2">
      <label for="star2" title="2 sterren"></label>

      <input type="radio" id="star1" name="rating" value="1">
      <label for="star1" title="1 ster"></label>

    </fieldset>
  </form>

</body>
</html>

			</video>
		</details>
	</body>
</html>
